[build]
publish = "dist"
command = "npx vite build"

[build.environment]
NODE_VERSION = "18"

[functions]
directory = "netlify/functions"

[[redirects]]
from = "/assets/*"
to = "/assets/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/manifest.json"

[headers.values]
Content-Type = "application/manifest+json"

[[headers]]
for = "/sw.js"

[headers.values]
Content-Type = "application/javascript"
Service-Worker-Allowed = "/"